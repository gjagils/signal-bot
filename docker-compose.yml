services:
  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=normal
    restart: unless-stopped

  signal-bot:
    image: ghcr.io/gjagils/signal-bot:latest
    env_file:
      - stack.env
    environment:
      - SIGNAL_API_URL=http://signal-cli-rest-api:8080
    depends_on:
      - signal-cli-rest-api
    restart: unless-stopped

volumes:
  signal-cli-data:
